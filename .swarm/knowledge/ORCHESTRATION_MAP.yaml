- frontier: dev-billing
  trees: ["src/services/DevStore.Billing.API", "src/services/DevStore.Billing.DevsPay"]
  entry_points:
    - "PaymentController — Controllers/PaymentController.cs:5 — classe VAZIA, sem endpoints HTTP reais"
    - "BillingIntegrationHandler : IConsumer<OrderInitiatedIntegrationEvent>, IConsumer<OrderLoweredStockIntegrationEvent>, IConsumer<OrderCanceledIntegrationEvent> — Services/BillingIntegrationHandler.cs:11-14 — ÚNICA superfície real da fronteira, 100% mensageria"
  typical_flow: "BillingIntegrationHandler.Consume(OrderInitiatedIntegrationEvent) (Services/BillingIntegrationHandler.cs:32-35) → AuthorizeTransaction monta Payment+CreditCard → BillingService.AuthorizeTransaction (Services/BillingService.cs:24-52) → CreditCardPaymentFacade.AuthorizePayment (Facade/CreditCardPaymentFacade.cs:20-46) instancia DevsPay.Transaction EM MEMÓRIA (ProjectReference direto, sem HTTP) → Transaction.AuthorizeCardTransaction() (Billing.DevsPay/Transaction.cs:99-135) usa Bogus faker.Random.Bool(0.7f) — 70% de sucesso SIMULADO, sem gateway real → resultado convertido de volta via cast (TransactionStatus)transaction.Status (CreditCardPaymentFacade.cs:73) → BillingIntegrationHandler responde via context.RespondAsync ao Request<> do Orders.API. Consume(OrderLoweredStockIntegrationEvent) (linhas 37-40) → CapturePayment busca transação Authorized existente e chama CapturePayment/DevsPay.CaptureCardTransaction (sempre Paid, sem simulação de falha) → publica OrderPaidIntegrationEvent. Consume(OrderCanceledIntegrationEvent) → CancelTransaction → DevsPay.CancelAuthorization (sempre Cancelled)."
  key_abstractions:
    - "Payment/Transaction/CreditCard (Models/*.cs) — CreditCard NUNCA persistida (PaymentMapping.cs Ignore), mas trafega em claro no bus antes disso"
    - "TransactionStatus enum (Billing.API): Authorized=1,Paid=2,Denied=3,Refund=4,Canceled=5 — INDEPENDENTE do TransactionStatus (DevsPay): Authorized=1,Paid=2,Refused=3,Chargeback=4,Cancelled=5"
    - "IPaymentFacade/CreditCardPaymentFacade — encapsula Authorize/Capture/Cancel delegando à lib simuladora DevsPay, com conversão de enum por CAST POSICIONAL sem tabela de tradução"
  depends_on: ["dev-core", "dev-orders", "dev-catalog"]
  density: "Billing.API 928 linhas (25 arquivos, controller vazio) + Billing.DevsPay 235 linhas (5 arquivos) · 3 IConsumer · 1 migration"
  verified: true
  findings_criticos:
    - "BUG CONFIRMADO (enum mismatch): cast (TransactionStatus)transaction.Status em CreditCardPaymentFacade.cs:73 mapeia DevsPay.Chargeback(4)→Billing.API.Refund(4) — mistura silenciosamente dois conceitos de negócio distintos (estorno forçado por operadora vs reembolso voluntário), sem log/validação/exceção."
    - "BUG CONFIRMADO (PII/PCI no bus): OrderInitiatedIntegrationEvent (building-blocks/DevStore.Core/Messages/Integration/OrderInitiatedIntegrationEvent.cs:12-15) carrega Holder/CardNumber/ExpirationDate/SecurityCode EM CLARO pelo RabbitMQ — violação PCI-DSS (CVV nunca deveria transitar) e sem mascaramento/tokenização antes da publicação (origem: OrderCommandHandler.cs:140-143)."
    - "AUSÊNCIA CONFIRMADA de idempotência: nenhuma chave de deduplicação/MessageId-seen em Authorize/Capture/Cancel (BillingService.cs:24-118) — redelivery do RabbitMQ do mesmo evento de captura/autorização/cancelamento executaria a operação de novo (cobrança simulada duplicada)."


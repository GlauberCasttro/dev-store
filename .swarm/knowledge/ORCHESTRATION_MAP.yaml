- frontier: dev-core
  trees: ["src/building-blocks/DevStore.Core", "src/building-blocks/DevStore.WebAPI.Core"]
  entry_points:
    - "Entity.cs — base de domínio (Id, eventos) herdada por toda entidade/aggregate root do repo (src/building-blocks/DevStore.Core/DomainObjects/Entity.cs:7)"
    - "ApiCoreConfig.AddApiCoreConfiguration/UseApiCoreConfiguration — bootstrap padrão que TODA API chama no Program.cs (src/building-blocks/DevStore.WebAPI.Core/Configuration/ApiCoreConfig.cs:23,53)"
    - "AddMessageBus — ponto de entrada de configuração do MassTransit/RabbitMQ para cada serviço (src/building-blocks/DevStore.MessageBus/DependencyInjectionExtensions.cs:9)"
  typical_flow: "Serviço registra MediatR próprio no Program.cs e liga IMediatorHandler→MediatorHandler (src/building-blocks/DevStore.Core/Mediator/MediatorHandler.cs:17-25, SendCommand/PublishEvent delegam a IMediator.Send/Publish) → serviço chama AddApiCoreConfiguration().WithDbContext<TContext>() → ApiCoreConfig.cs:48 chama ConfigureProviderForContext → ProviderConfiguration.DetectDatabase lê AppSettings:DatabaseType (src/building-blocks/DevStore.WebAPI.Core/DatabaseFlavor/ProviderConfiguration.cs:51-56) → ProviderSelector escolhe SqlServer/MySql/Postgre/Sqlite (ProviderSelector.cs:10-24) → UseApiCoreConfiguration ativa JWT (JwtConfig) + health checks /healthz e /healthz-infra (GenericHealthCheck.cs:33-47) → serviço chama AddMessageBus(configuration) → MassTransit configurado com consumers da assembly + RabbitMQ (DependencyInjectionExtensions.cs:17-30)."
  key_abstractions:
    - "Entity/IAggregateRoot — base de toda entidade de domínio, com AddEvent/Notificacoes (DomainObjects/Entity.cs:7,17)"
    - "Command : IRequest<ValidationResult> / Event : INotification — base de CQRS in-process via MediatR (Messages/Command.cs:7, Messages/Event.cs:6)"
    - "IntegrationEvent e subtipos (OrderPaidIntegrationEvent, OrderInitiatedIntegrationEvent, UserRegisteredIntegrationEvent, etc.) — contratos cross-serviço via bus (Messages/Integration/*.cs)"
    - "MainController : Controller — base HTTP com CustomResponse padronizado (WebAPI.Core/Controllers/MainController.cs:11)"
    - "IAspNetUser/AspNetUser — abstração de identidade autenticada sobre HttpContext, expõe Email/UserId/Token (WebAPI.Core/User/IAspNetUser.cs:8)"
  depends_on: []
  density: "42 arquivos .cs · 1157 linhas · 9 IntegrationEvent · zero ProjectReference de saída (raiz da árvore de dependências — 8 dos 9 outros projetos de serviço dependem de pelo menos um destes 3)"
  verified: true


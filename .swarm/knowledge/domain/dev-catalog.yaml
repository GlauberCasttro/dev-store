  applies_to: "dev-catalog · Data/Repository/ProductRepository.cs"
  source: "src/services/DevStore.Catalog.API/Data/Repository/ProductRepository.cs:26,32"
  confidence: verified
  check: "grep -n AsNoTrackingWithIdentityResolution ProductRepository.cs"

- id: DOMAIN-CATALOG-004
  kind: project_pattern
  claim: "TakeFromInventory/IsAvailable em Product.cs são chamados pelo consumer CatalogIntegrationHandler ao processar OrderAuthorizedIntegrationEvent — a baixa de estoque é reativa a evento, não parte do fluxo síncrono de compra. Mudanças em regra de estoque têm que considerar o delay assíncrono (o pedido pode ser autorizado antes do estoque ser efetivamente baixado)."
  applies_to: "dev-catalog · baixa de estoque assíncrona"
  source: "src/services/DevStore.Catalog.API/Services/CatalogIntegrationHandler.cs:24,29,49-52,62"
  confidence: verified

- id: DOMAIN-MESSAGING-003
  kind: project_pattern
  claim: "REFUTADA E CORRIGIDA pela sonda de maestria (2b.6): a claim original ('duas fontes divergentes de config do RabbitMQ, risco de split-brain') está ERRADA — GetMessagingConnectionString (ConfigurationExtensions.cs) lê a MESMA seção 'RabbitMqTransportOptions' que o bind do MassTransit (DependencyInjectionExtensions.cs:13-15), não é fonte independente. O achado REAL e mais grave: AddMessagingHealthCheck (MessagingExtensions.cs) NUNCA é chamada em nenhum Program.cs/Configuration dos 6 serviços — é código morto. O risco real é 'health check de RabbitMQ ausente', não 'split-brain de configuração'."
  applies_to: "dev-messaging · health check de RabbitMQ é código morto (não split-brain)"
  source: "src/building-blocks/DevStore.MessageBus/ConfigurationExtensions.cs:8-16 (mesma seção RabbitMqTransportOptions); src/building-blocks/DevStore.MessageBus/DependencyInjectionExtensions.cs:13-15; grep -rn 'AddMessagingHealthCheck' src → zero chamadas fora da própria definição"
  confidence: verified
  check: "grep -rn 'AddMessagingHealthCheck' src/services src/building-blocks/*/Program.cs → confirmar ausência de call site"

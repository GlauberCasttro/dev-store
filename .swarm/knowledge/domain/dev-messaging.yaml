# Fatia de domínio — dev-messaging (standby)
- id: DOMAIN-MESSAGING-001
  kind: principle
  claim: "Não há MassTransit Saga/StateMachine no repo — toda orquestração cross-serviço é ad-hoc (Request/Response síncrono ou Publish/Consume simples com compensação manual, ex.: dev-identity.Register). Se um pedido de founder introduzir uma Saga real, este é o agente que deveria assumir a fronteira, não o dono do bounded context individual."
  applies_to: "dev-messaging · gatilho de ativação (standby → integrated)"
  source: "grep -rliE 'saga|statemachine' --include=*.cs src → vazio"
  confidence: verified
  check: "repetir o grep após qualquer nova feature de orquestração — se a ausência deixar de ser verdadeira, reconsiderar standby"


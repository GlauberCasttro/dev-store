# Fatia de domínio — architect (core, conhece o sistema inteiro)
- id: DOMAIN-ARCHITECT-001
  kind: principle
  claim: "O único contrato de camada FORMAL do repo é Orders.Domain (puro, só depende de Core) → Orders.Infra (implementa IOrderRepository). Todos os outros 8 serviços são monolíticos-por-serviço (Controllers/Data/Models na mesma pasta, sem split de projeto). Uma decisão de arquitetura que proponha layering formal para outro serviço precisa justificar o custo extra vs o padrão dominante do repo."
  applies_to: "architect · padrão de camadas real vs proposto"
  source: "PROJECT_PROFILE.yaml#architecture.detected_layers"
  confidence: verified
  check: "comparar Orders (3 projetos) com qualquer outro serviço (1 projeto)"

- id: DOMAIN-ARCHITECT-002
  kind: principle
  claim: "Dois caminhos de comunicação cross-serviço coexistem: síncrono bloqueante (MassTransit Request<>, usado em Orders→Billing) e assíncrono fire-and-forget (Publish/Consume, usado nos demais fluxos). Decisão de arquitetura sobre novo fluxo cross-serviço tem que escolher explicitamente um dos dois padrões e justificar — não inventar um terceiro (ex.: HTTP síncrono direto entre serviços de domínio, que não existe hoje)."
  applies_to: "architect · dois padrões de integração já estabelecidos"
  source: "knowledge/ORCHESTRATION_MAP.yaml (dev-orders depends_on dev-billing síncrono; demais assíncronos)"
  confidence: verified
  check: "ver DOMAIN-ORDERS-004"


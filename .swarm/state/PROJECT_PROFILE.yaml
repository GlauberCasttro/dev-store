    - {concept: "Carrinho",            term_used: "ShoppingCart", found_in: [src/services/DevStore.ShoppingCart.API, src/api-gateways/DevStore.Bff.Checkout], count: 226, never_use: ["Basket", "Cart isolado"]}
    - {concept: "Cupom/Desconto",      term_used: "Voucher",      found_in: [src/services/DevStore.Orders.Domain, src/services/DevStore.ShoppingCart.API, src/api-gateways/DevStore.Bff.Checkout], count: 283, never_use: ["Coupon", "Cupom (nomes de classe)"]}
    - {concept: "Cliente",             term_used: "Customer",     found_in: [src/services/DevStore.Customers.API], count: 39, never_use: ["Client"]}
    - {concept: "Produto",             term_used: "Product",      found_in: [src/services/DevStore.Catalog.API], count: 62, never_use: ["Item (para produto de catálogo)"]}
    - {concept: "Documento fiscal",    term_used: "SocialNumber", found_in: [src/services/DevStore.Customers.API], count: 16, never_use: ["CPF (nome de campo)"]}
    - {concept: "Base de domínio",     term_used: "Entity",       found_in: [src/building-blocks/DevStore.Core, "todas as fronteiras de serviço"], count: 24, never_use: ["BaseEntity"]}
    - {concept: "Acesso a dados",      term_used: "Repository",   found_in: [src/building-blocks/DevStore.Core, "todas as fronteiras de serviço"], count: 12, never_use: ["Gateway", "Client (para persistência)"]}
    - {concept: "Erro de negócio",     term_used: "ValidationResult (FluentValidation) + DomainException", found_in: [src/building-blocks/DevStore.Core, src/services/DevStore.Customers.API, src/services/DevStore.Orders.API], count: 6, never_use: ["Notification pattern clássico (lista de erros no Entity)"]}
  suffixes:
    Controller: "endpoint HTTP (MVC-style; ShoppingCart.API usa Minimal API em Program.cs, sem Controller)"
    Service: "orquestração de caso de uso ou client HTTP tipado (ambíguo — usado nos dois sentidos)"
    Repository: "acesso a dados via IRepository<T>"
    Context: "DbContext do EF Core, 1 por serviço"
    Command / CommandHandler: "escrita via MediatR (IRequest<ValidationResult>)"
    Event / EventHandler: "evento de domínio in-process via MediatR (INotification)"
    IntegrationEvent / IntegrationHandler: "evento cross-serviço via MassTransit/RabbitMQ"
    ViewModel: "DTO de apresentação (WebApp.MVC)"
    Dto / DTO: "DTO de integração (Bff.Checkout) — grafia inconsistente (Dto vs DTO coexistem)"
    Mapping: "IEntityTypeConfiguration<T> do EF Core"
    Validation: "AbstractValidator<T> do FluentValidation, geralmente nested class no próprio Command/Model"
  language:
    domain_class_and_folder_names: "inglês (100% — 0 ocorrências de Pedido/Cupom/Cliente como nome de classe em nenhuma fronteira)"
    user_facing_validation_messages: "português (ex.: VoucherValidation.cs: \"Este voucher está expirado\")"
    namespaces: "inglês, prefixo DevStore.<Servico>"

never_use:
  - {pattern: "AutoMapper",            reason: "mapeamento sempre manual/explícito (MapOrder, ToViewModel, construtores de DTO)", source: "grep -rc AutoMapper --include=*.csproj src → 0 em 16/16 projetos", scope: convention}
  - {pattern: "BaseEntity",            reason: "a base de domínio chama-se sempre Entity",                                          source: "grep -rn BaseEntity src --include=*.cs → 0 ocorrências; Entity.cs (DevStore.Core) é a única base",                     scope: convention}
  - {pattern: "Basket",                reason: "termo do domínio é ShoppingCart em toda fronteira de carrinho",                     source: "grep -rc Basket src --include=*.cs → 0",                                                                              scope: convention}
  - {pattern: "Coupon / Cupom",        reason: "termo do domínio é Voucher em Orders/ShoppingCart/Bff.Checkout",                    source: "grep -rc Coupon src --include=*.cs → 0",                                                                              scope: convention}
  - {pattern: "IGateway / IClient (para persistência)", reason: "acesso a dados sempre via IRepository<T> : IDisposable",           source: "grep -rE 'interface I.*Gateway|interface I.*Client' em dev-core → 0 (busca ampliada ao repo não encontrou padrão análogo em outras fronteiras)", scope: convention}
  - {pattern: "Moq / NSubstitute / FluentAssertions / AutoFixture / Bogus em testes de qa", reason: "o único teste real existente (DevStore.Tests) é 100% integração ponta-a-ponta com WebApplicationFactory + SQL Server real, sem nenhum mock", source: "DevStore.Tests.csproj sem nenhuma dessas libs; grep 'Mock<|Substitute.For' → 0", scope: convention}
  - {pattern: "Refit como client HTTP ativo", reason: "Refit está referenciado em 3 .csproj (WebApp.MVC, Bff.Checkout — e é usado só para capturar ValidationApiException/ApiException em WebApp.MVC/Extensions/ExceptionMiddleware.cs:8,34,38); todo client HTTP real usa HttpClient tipado (AddHttpClient<TInterface,TImpl>) + Polly", source: "grep -rE '\\[Get\\(|\\[Post\\(|: IRefit' em Services/*.cs de WebApp.MVC e Bff.Checkout → 0", scope: convention}


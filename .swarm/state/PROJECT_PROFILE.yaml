gate_signals:
  security:
    value: true
    evidence:
      - "dev-identity emite/valida JWT (JWKS rotativo) e faz hashing de senha (Argon2) — src/services/DevStore.Identity.API/Configuration/JwtConfig.cs:22, IdentityConfig.cs:38-40"
      - "dev-billing publica PAN+CVV em claro no bus RabbitMQ (OrderInitiatedIntegrationEvent) — src/building-blocks/DevStore.Core/Messages/Integration/OrderInitiatedIntegrationEvent.cs:12-15; origem em src/services/DevStore.Orders.API/Application/Commands/OrderCommandHandler.cs:140-143 — violação PCI-DSS confirmada"
      - "dev-billing tem enum mismatch confirmado entre TransactionStatus (Billing.API) e TransactionStatus (DevsPay) — cast posicional silencioso mapeia Chargeback→Refund — src/services/DevStore.Billing.API/Facade/CreditCardPaymentFacade.cs:73,88"
      - "dev-billing sem proteção de idempotência em Authorize/Capture/Cancel — reprocessamento de evento duplica cobrança simulada — src/services/DevStore.Billing.API/Services/BillingService.cs:24-118"
      - "dev-customers persiste SocialNumber (CPF) e Email em claro — src/services/DevStore.Customers.API/Data/Mappings/CustomerMapping.cs:18-27; e publica ambos no bus via UserRegisteredIntegrationEvent"
  perf:
    value: false
    evidence: "Nenhum benchmark, meta de SLO ou hot-path documentado (docs/ vazio, 0 ADRs). Polly existe para resiliência (retry), não para tuning de performance."
  devops:
    value: true
    evidence: "docker-compose com 8 serviços + SQL Server 2022 + RabbitMQ 4.1 + Seq + nginx (reverse proxy/TLS) + geração automática de certificado; CI (.github/workflows/build.yml) builda+testa+builda imagens Docker+push; serviço dedicado DevStore.WebApp.Status para dashboard de health checks agregado. Footgun de config real já encontrado nesse serviço: appsettings.Production.json define ENDPOINTS como array JSON enquanto Program.cs:14 espera string única via Get<string>() — inconsistência Development/Docker (string ';'/'|') vs Production (array), risco de dashboard de status quebrado/vazio em prod sem erro visível."
  git:
    value: false
    evidence: "Prefixos de commit convencionais (feat/chore/refactor) usados na prática (git log), mas sem enforcement mecânico — nenhum commitlint/husky/lefthook configurado no repo (lefthook está instalado no SISTEMA do operador, não no repo)."


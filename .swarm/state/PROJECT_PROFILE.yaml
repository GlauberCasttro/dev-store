# Estágio 1 — Scan⁺ · PROJECT_PROFILE.yaml
# DevStore — e-commerce de referência .NET, arquitetura de microserviços.
# Gerado em 2026-07-01 via scan real (16 subagentes de leitura, evidência arquivo:linha).

project:
  name: DevStore
  description_1_line: "E-commerce de referência em .NET 9 com 9 microserviços, 1 BFF, 1 web MVC, message bus RabbitMQ/MassTransit e banco multi-provider por serviço."
  monorepo: true

stacks:
  - ecosystem: dotnet
    root: "."
    runtime_version: "9.0.302"
    version_evidence: "global.json:3 (sdk.version, rollForward: latestPatch)"
    build_cmd: "dotnet build --configuration Release --no-restore"
    test_cmd: "dotnet test --no-build --no-restore --configuration Release --logger \"console;verbosity=detailed\""
    lint_cmd: null   # nenhum `dotnet format` no CI nem em scripts do repo — ausência confirmada (grep vazio em .github/workflows)
    probe_cmd: "dotnet test --list-tests"   # modo não-mutante (D6) — NÃO EXECUTADO nesta sessão (ver verified:false)
    verified: false
    verified_reason: "SDK .NET 9.0.302 exigido pelo global.json não está instalado nesta máquina (só 8.0.125, rollForward=latestPatch recusa). `dotnet build`/`dotnet test` falham com erro de resolução de SDK. Decisão do founder (Estágio 1, pergunta material): manter unverified em vez de instalar o SDK agora. Comandos vêm do CI real (.github/workflows/build.yml:71-77), não são hipótese."
    source_of_commands: ".github/workflows/build.yml (job build-and-test)"

layout:
  product_dirs:
    - src/api-gateways/DevStore.Bff.Checkout
    - src/building-blocks/DevStore.Core
    - src/building-blocks/DevStore.MessageBus
    - src/building-blocks/DevStore.WebAPI.Core
    - src/services/DevStore.Billing.API
    - src/services/DevStore.Billing.DevsPay
    - src/services/DevStore.Catalog.API
    - src/services/DevStore.Customers.API
    - src/services/DevStore.Identity.API
    - src/services/DevStore.Orders.API
    - src/services/DevStore.Orders.Domain
    - src/services/DevStore.Orders.Infra
    - src/services/DevStore.ShoppingCart.API
    - src/web/DevStore.WebApp.MVC
    - src/web/DevStore.WebApp.Status
  test_dirs:
    - src/tests/DevStore.Tests
  infra_dirs:
    - docker
    - .github/workflows
  docs_dirs:
    - docs   # existe mas está vazio (0 arquivos) — nenhum ADR/doc de arquitetura pré-existente

architecture:
  # A2 — camadas por sufixo de projeto (.csproj), 16 projetos no total (DevStore.slnx)
  detected_layers:
    - {project: DevStore.Bff.Checkout,     path: src/api-gateways/DevStore.Bff.Checkout,     logical_layer: api-gateway}
    - {project: DevStore.Core,             path: src/building-blocks/DevStore.Core,          logical_layer: core}
    - {project: DevStore.MessageBus,       path: src/building-blocks/DevStore.MessageBus,    logical_layer: core}
    - {project: DevStore.WebAPI.Core,      path: src/building-blocks/DevStore.WebAPI.Core,   logical_layer: core}
    - {project: DevStore.Billing.API,      path: src/services/DevStore.Billing.API,          logical_layer: api}
    - {project: DevStore.Billing.DevsPay,  path: src/services/DevStore.Billing.DevsPay,      logical_layer: infra}   # lib in-process, simulador de gateway (Bogus), sem Sdk.Web
    - {project: DevStore.Catalog.API,      path: src/services/DevStore.Catalog.API,          logical_layer: api}
    - {project: DevStore.Customers.API,    path: src/services/DevStore.Customers.API,        logical_layer: api}
    - {project: DevStore.Identity.API,     path: src/services/DevStore.Identity.API,         logical_layer: api}
    - {project: DevStore.Orders.API,       path: src/services/DevStore.Orders.API,           logical_layer: api}
    - {project: DevStore.Orders.Domain,    path: src/services/DevStore.Orders.Domain,        logical_layer: domain}
    - {project: DevStore.Orders.Infra,     path: src/services/DevStore.Orders.Infra,         logical_layer: infra}
    - {project: DevStore.ShoppingCart.API, path: src/services/DevStore.ShoppingCart.API,     logical_layer: api}
    - {project: DevStore.Tests,            path: src/tests/DevStore.Tests,                   logical_layer: test}
    - {project: DevStore.WebApp.MVC,       path: src/web/DevStore.WebApp.MVC,                logical_layer: web}
    - {project: DevStore.WebApp.Status,    path: src/web/DevStore.WebApp.Status,             logical_layer: web}
  shared_kernel:
    # Core + MessageBus + WebAPI.Core não são "Domain+Domain.Core" (o caso literal do A2.4),
    # mas cumprem o MESMO papel: zero ProjectReference de saída, TODOS os outros 13 projetos
    # de produto dependem de pelo menos um dos três (confirmado via grep de ProjectReference
    # em todos os .csproj) → tratados como UMA fronteira (dev-core), não três.
    - src/building-blocks/DevStore.Core
    - src/building-blocks/DevStore.MessageBus
    - src/building-blocks/DevStore.WebAPI.Core
  # Único bounded context com split real de camada em projetos distintos (clean architecture):
  orders_layering: "DevStore.Orders.API (api) + DevStore.Orders.Domain (domain) + DevStore.Orders.Infra (infra) — 3 projetos, 1 fronteira dev-orders (mesmo bounded context, não shared kernel)."

# NOTA (pós-Estágio 2/3): nomes abaixo são os CANDIDATOS do scan (Estágio 1). O roster final
# (TEAM_ROSTER.yaml) renomeou/fundiu: dev-status → gate `devops`; qa → `qa-dotnet`; e o
# Estágio 3 (mesa redonda) moveu DevStore.MessageBus de dev-core para o território real de
# `dev-messaging` (evitar overlap de trees — ver TEAM_ROSTER.yaml). Fonte de verdade de
# território ATIVO é sempre TEAM_ROSTER.yaml, não este bloco histórico.
agent_trees:
  dev-core:          [src/building-blocks/DevStore.Core, src/building-blocks/DevStore.MessageBus, src/building-blocks/DevStore.WebAPI.Core]
  dev-catalog:        [src/services/DevStore.Catalog.API]
  dev-customers:      [src/services/DevStore.Customers.API]
  dev-identity:       [src/services/DevStore.Identity.API]
  dev-orders:         [src/services/DevStore.Orders.API, src/services/DevStore.Orders.Domain, src/services/DevStore.Orders.Infra]
  dev-billing:        [src/services/DevStore.Billing.API, src/services/DevStore.Billing.DevsPay]
  dev-cart:           [src/services/DevStore.ShoppingCart.API]
  dev-checkout-bff:   [src/api-gateways/DevStore.Bff.Checkout]
  dev-web:            [src/web/DevStore.WebApp.MVC]
  dev-status:         [src/web/DevStore.WebApp.Status]   # candidato — 1 arquivo, 0 lógica de negócio; ver gate_signals.devops. Estágio 2 decide standalone vs fundido em gate devops.
  qa:                 [src/tests/DevStore.Tests]
  # Sem sobreposição entre fronteiras — confirmado (cada projeto pertence a exatamente 1 fronteira).

